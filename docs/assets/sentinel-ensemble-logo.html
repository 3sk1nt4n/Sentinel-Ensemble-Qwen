<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:340px;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center;
    font-family:"Inter","Liberation Sans","DejaVu Sans",sans-serif;background:transparent}
  .card{width:1240px;height:300px;border-radius:24px;position:relative;overflow:hidden;
    background:#050a12;
    background-image:
      radial-gradient(760px 380px at 88% 15%, rgba(24,70,92,.30), transparent 62%),
      radial-gradient(560px 320px at 6% 100%, rgba(70,46,12,.16), transparent 60%),
      linear-gradient(180deg,#070d16,#04080e);
    border:1px solid rgba(90,180,205,.22);
    box-shadow:0 0 0 1px rgba(0,0,0,.4) inset, 0 24px 60px rgba(0,0,0,.5);
    display:flex;align-items:center;gap:46px;padding:0 58px}
  /* emblem: a hex shield with a check + 3 offset layers (ensemble) */
  .emblem{flex:0 0 172px;height:172px;position:relative}
  .emblem svg{position:absolute;inset:0}
  .word{display:flex;flex-direction:column;gap:2px}
  .eyebrow{display:flex;align-items:center;gap:12px;font-size:19px;font-weight:700;
    letter-spacing:5px;color:#38c4d2;margin-bottom:6px}
  .eyebrow .dash{width:30px;height:4px;background:#38c4d2;border-radius:2px}
  h1{font-size:76px;font-weight:800;letter-spacing:-1.5px;line-height:.98;
    background:linear-gradient(92deg,#f4f8fb 0%,#bfe9ee 22%,#49c8c2 44%,#8fce7a 64%,#e8c14b 84%,#ef9b31 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{margin-top:14px;font-size:24px;color:#9fb0c0;font-weight:500}
  .sub b{color:#dfe7ee;font-weight:600}
  .chip{margin-top:16px;display:inline-block;font-size:17px;letter-spacing:2px;font-weight:600;
    color:#8fd0da;border:1px solid rgba(95,215,230,.32);border-radius:20px;padding:6px 16px;background:rgba(10,26,34,.5)}
</style></head><body>
  <div class="card">
    <div class="emblem">
      <svg viewBox="0 0 172 172" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g" x1="16" y1="8" x2="156" y2="164" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7fe0ea"/><stop offset=".45" stop-color="#49c8c2"/>
            <stop offset=".75" stop-color="#8fce7a"/><stop offset="1" stop-color="#e8c14b"/>
          </linearGradient>
        </defs>
        <!-- ensemble: three offset shield ghosts behind the main -->
        <path d="M86 16 L142 40 V92 C142 128 116 150 86 160 C56 150 30 128 30 92 V40 Z"
              transform="translate(15,7) scale(.92)" stroke="rgba(95,200,215,.12)" stroke-width="3"/>
        <path d="M86 16 L142 40 V92 C142 128 116 150 86 160 C56 150 30 128 30 92 V40 Z"
              transform="translate(8,4) scale(.96)" stroke="rgba(95,200,215,.20)" stroke-width="3"/>
        <!-- main shield -->
        <path d="M86 14 L146 40 V94 C146 132 118 156 86 166 C54 156 26 132 26 94 V40 Z"
              fill="rgba(9,20,28,.85)" stroke="url(#g)" stroke-width="5" stroke-linejoin="round"/>
        <!-- verified check -->
        <path d="M58 90 L79 112 L118 62" stroke="url(#g)" stroke-width="12"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="word">
      <div class="eyebrow"><span class="dash"></span> DFIR &middot; SOC &middot; QWEN CLOUD</div>
      <h1>SENTINEL<br>ENSEMBLE</h1>
      <div class="sub">Autonomous DFIR/SOC agent. <b>The AI never gets the final word.</b></div>
      <div class="chip">QWEN ON ALIBABA CLOUD &nbsp;&middot;&nbsp; TRACK 4 &middot; AUTOPILOT AGENT</div>
    </div>
  </div>
</body></html>
